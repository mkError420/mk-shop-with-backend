[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "18"

# API routes - redirect to specific functions
[[redirects]]
  from = "/api/products"
  to = "/.netlify/functions/api-products"
  status = 200

[[redirects]]
  from = "/api/products/*"
  to = "/.netlify/functions/api-products"
  status = 200

[[redirects]]
  from = "/api/categories"
  to = "/.netlify/functions/api-categories"
  status = 200

[[redirects]]
  from = "/api/categories/*"
  to = "/.netlify/functions/api-categories"
  status = 200

[[redirects]]
  from = "/api/auth/login"
  to = "/.netlify/functions/api-auth-login"
  status = 200

[[redirects]]
  from = "/api/auth/*"
  to = "/.netlify/functions/api-auth-login"
  status = 200

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[plugins]]
  package = "@netlify/plugin-nextjs"
